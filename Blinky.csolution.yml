solution:
  created-for: cmsis-toolbox@2.12.0
  description: Simple blinky example for FRDM-K32L3A6.
  cdefault:

  select-compiler:
    - compiler: AC6
  compiler: AC6

  packs:
    - pack: ARM::CMSIS
    - pack: ARM::CMSIS-Compiler
    - pack: ARM::CMSIS-RTX
    - pack: ARM::CMSIS-View

    # packs for FRDM-K32L3A6
    - pack: NXP::K32L3A60_DFP
    - pack: NXP::FRDM-K32L3A6_BSP

  misc:
    - for-compiler: AC6
      C-CPP:
        - -gdwarf-5
      ASM:
        - -gdwarf-5

  target-types:
    - type: FRDM-K32L3A6
      board: NXP::FRDM-K32L3A6
      device: NXP::K32L3A60VPJ1A:cm4
      target-set:
        - set:
          debugger:
            name: CMSIS-DAP@pyOCD
            port: 3333
            protocol: swd
            clock: 10000000
          images:
            - project-context: FRDM-K32L3A6.Debug

  build-types:
    - type: Debug
      optimize: none
      debug: on

    - type: Release
      optimize: balanced
      debug: off

  projects:
    - project: ./FRDM-K32L3A6.cproject.yml
